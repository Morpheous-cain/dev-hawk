    <meta property="og:title" content="Black Hawk SOC-OS Console - Executive Command System" />

    <!-- Typography: Instrument Sans (UI), Instrument Serif (display), JetBrains Mono (numbers/IDs) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var PURGE_KEY = 'bh_socos_pwa_purge_v5';
        var MODULE_RELOAD_KEY = 'bh_socos_bootstrap_module_reload';
        var MODULE_ERROR_RE = /Importing a module script failed|Failed to fetch dynamically imported module|error loading dynamically imported module|Load failed|ChunkLoadError/i;

        function purgeRuntimeCaches() {
          var tasks = [];

          if ('serviceWorker' in navigator) {
            tasks.push(
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                return Promise.all(regs.map(function (r) { return r.unregister(); }));
              }).catch(function () {})
            );
          }

          if (window.caches && caches.keys) {
            tasks.push(
              caches.keys().then(function (keys) {
                return Promise.all(keys.map(function (k) { return caches.delete(k); }));
              }).catch(function () {})
            );
          }

          return Promise.all(tasks);
        }

        function hardReloadOnce(key) {
          try {
            if (sessionStorage.getItem(key) === '1') return;
            sessionStorage.setItem(key, '1');
          } catch (e) {}

          purgeRuntimeCaches().finally(function () {
            var url = new URL(window.location.href);
            url.searchParams.set('_v', Date.now().toString());
            window.location.replace(url.toString());
          });
        }

        window.__bhRecoverModuleLoad = function () {
          hardReloadOnce(MODULE_RELOAD_KEY);
        };

        window.addEventListener('error', function (event) {
          var target = event && event.target;
          if (target && target.tagName === 'SCRIPT' && target.type === 'module') {
            hardReloadOnce(MODULE_RELOAD_KEY);
            return;
          }

          var message = (event && (event.message || (event.error && event.error.message))) || '';
          if (MODULE_ERROR_RE.test(String(message))) {
            hardReloadOnce(MODULE_RELOAD_KEY);
          }
        }, true);

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          var message = reason && reason.message ? reason.message : String(reason || '');
          if (MODULE_ERROR_RE.test(message)) {
            hardReloadOnce(MODULE_RELOAD_KEY);
          }
        });

        window.addEventListener('vite:preloadError', function (event) {
          if (event && event.preventDefault) event.preventDefault();
          hardReloadOnce(MODULE_RELOAD_KEY);
        });

        try {
          var alreadyPurged = localStorage.getItem(PURGE_KEY) === '1';
          purgeRuntimeCaches().then(function () {
            if (!alreadyPurged && (
              ('serviceWorker' in navigator) || (window.caches && caches.keys)
            )) {
              localStorage.setItem(PURGE_KEY, '1');
              if (performance && performance.getEntriesByType) {
                var nav = performance.getEntriesByType('navigation')[0];
                if (!nav || nav.type !== 'reload') {
                  location.reload();
                }
              } else {
                location.reload();
              }
            }
          });
        } catch (e) {}
      })();
    </script>
    <script id="app-entry" type="module" src="/src/main.tsx" onerror="window.__bhRecoverModuleLoad && window.__bhRecoverModuleLoad()"></script>
  </body>
</html>
